# Minimal CoreDHCP configuration with CoreSMD plugin
# This configuration provides DHCP services for OpenCHAMI cluster components
#
# For detailed configuration examples and hostname pattern documentation,
# see coredhcp-config.yaml

server4:
  plugins:
    # Basic DHCP configuration
    - server_id: 192.168.1.1
    - dns: 8.8.8.8 1.1.1.1
    - router: 192.168.1.254
    - netmask: 255.255.255.0

    # CoreSMD plugin with minimal configuration
    # This uses default hostname patterns: nodes get "nid0001", "nid0002", etc.
    # No BMC hostnames are assigned, and no domain suffix is added
    - coresmd: smd_url=https://smd.cluster.local boot_script_url=http://192.168.1.1 cache_duration=30s lease_duration=24h

    # To customize hostnames, add node_pattern, bmc_pattern, and/or domain parameters:
    # - coresmd: smd_url=https://smd.cluster.local boot_script_url=http://192.168.1.1 cache_duration=30s lease_duration=24h node_pattern="compute-{04d}" bmc_pattern="bmc{03d}" domain=cluster.local

# Logging configuration
log:
  level: info
  format: text 