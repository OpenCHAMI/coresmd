# CoreSMD Plugin Configuration - LANL Example
# Example configuration for LANL deployment with custom hostname patterns

smd:
  base_url: "https://smd.dev-osc.lanl.gov"
  ca_cert_path: "/etc/coresmd/lanl-ca.crt"
  cache_duration: "30s"

boot:
  script_base_url: "http://172.16.0.253:8081"

dhcp:
  lease_duration: "24h"

tftp:
  single_port: false

hostname:
  # Generate hostnames like: dev-s01, dev-s02, ...
  node_pattern: "dev-s{02d}"
  
  # Generate BMC hostnames like: bmc001, bmc002, ...
  bmc_pattern: "bmc{03d}"
  
  # Full domain: dev-s01.dev-osc.lanl.gov
  domain: "dev-osc.lanl.gov"
