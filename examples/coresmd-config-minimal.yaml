# CoreSMD Plugin Configuration - Minimal Example
# This is a minimal configuration for the coresmd DHCP plugin

smd:
  base_url: "https://smd.cluster.local"
  ca_cert_path: ""  # Empty for no TLS verification
  cache_duration: "30s"

boot:
  script_base_url: "http://192.168.1.1"

dhcp:
  lease_duration: "1h"

tftp:
  single_port: false

hostname:
  node_pattern: "nid{04d}"
  bmc_pattern: "bmc{03d}"
  domain: ""  # No domain suffix
